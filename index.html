<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* Color Palette */

.palette{
display:flex;
gap:20px;
padding:20px;
background:#f4f4f4;
}

.color{
width:25px;
height:25px;
border-radius:50%;
}

.c1{background:#0B1FAF;}
.c2{background:#2E5BFF;}
.c3{background:#FF7A30;}
.c4{background:#EAE2D2;}


/* HERO SECTION */

.hero{
height:100vh;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.subtitle{
letter-spacing:4px;
margin-bottom:10px;
font-size:14px;
}

.title{
font-size:150px;
font-weight:900;
color:#2E5BFF;
}

.year{
margin-top:20px;
font-size:20px;
}


/* ABOUT SECTION */

.about{
display:flex;
justify-content:space-between;
align-items:center;
padding:100px 10%;
background:#f2f2f2;
}

.about-text{
width:50%;
}

.about-text h2{
font-size:40px;
margin-bottom:20px;
}

.about-text p{
font-size:18px;
line-height:1.6;
}

.about-img img{
width:300px;
}

</style>

</head>

<body>

<!-- COLOR PALETTE -->
<div class="palette">
<span class="color c1"></span>
<span class="color c2"></span>
<span class="color c3"></span>
<span class="color c4"></span>
</div>


<!-- HERO -->

<section class="hero">

<h4 class="subtitle">GRAPHIC DESIGNER</h4>

<h1 class="title">PORTFOLIO</h1>

<p class="year">2026</p>

</section>


<!-- ABOUT -->

<section class="about">

<div class="about-text">
<h2>ABOUT ME</h2>

<p>
I am a creative graphic designer passionate about branding,
visual communication, and digital experiences. I enjoy creating
modern and unique designs that help brands stand out.
</p>

</div>

<div class="about-img">
<img src="character.png" alt="designer">
</div>

</section>

</body>
</html>
